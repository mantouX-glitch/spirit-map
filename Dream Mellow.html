<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dream Meadow · 源星球</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400&family=Share+Tech+Mono&display=swap');

:root {
  --void: #03020a;
  --deep: #060415;
  --indigo: #1a0a3a;
  --violet: #2d1060;
  --iris: #5b2d9e;
  --lavender: #9b72d8;
  --mist: #b8a8e8;
  --glow: #c8b8ff;
  --text-dim: #7060a0;
  --text-mid: #a090c8;
  --text-light: #d0c4f0;

  --ink:        rgba(216,200,250,.85);
  --ink-soft:   rgba(170,150,215,.62);
  --ink-faint:  rgba(150,130,195,.38);
  --ink-trace:  rgba(140,120,185,.2);
  --accent:     rgba(200,184,255,.75);
  --frame:      #a98fe0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--void);
  font-family: 'Noto Serif SC', serif;
  -webkit-font-smoothing: antialiased;
  cursor: none;
  user-select: none;
}
a, button { cursor: none; }

/* Custom cursor */
#cursor {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--glow);
  box-shadow: 0 0 12px var(--lavender), 0 0 24px var(--iris);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s;
  mix-blend-mode: screen;
}
#cursor-ring {
  position: fixed;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(155, 114, 216, 0.35);
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: all 0.18s ease;
}

/* Stars layer */
#stars {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* Nebula bg */
#nebula {
  position: fixed;
  inset: 0;
  z-index: 1;
  background:
    radial-gradient(ellipse 70% 50% at 30% 40%, rgba(45,16,96,0.45) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 75% 60%, rgba(13,26,74,0.5) 0%, transparent 65%),
    radial-gradient(ellipse 80% 40% at 50% 80%, rgba(10,4,28,0.8) 0%, transparent 100%);
  animation: nebulaDrift 28s ease-in-out infinite alternate;
}
@keyframes nebulaDrift {
  0% { background-position: 0% 50%; opacity: 0.85; }
  100% { opacity: 1; filter: hue-rotate(18deg); }
}

/* White sun — soft corona at horizon, breathing */
#white-sun {
  position: fixed;
  bottom: -140px;
  left: 50%;
  transform: translateX(-50%);
  width: 360px; height: 360px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255,255,255,0.42) 0%,
    rgba(248,247,255,0.26) 22%,
    rgba(232,230,252,0.1) 46%,
    rgba(220,218,250,0.04) 62%,
    transparent 74%);
  box-shadow:
    0 0 90px rgba(255,255,255,0.16),
    0 0 180px rgba(240,238,255,0.1),
    0 0 320px rgba(225,220,255,0.07);
  mix-blend-mode: screen;
  z-index: 2;
  animation: sunPulse 8s ease-in-out infinite;
}
@keyframes sunPulse {
  0%, 100% { opacity: 0.65; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.07); }
}

/* Main canvas for grass */
#grass-canvas {
  position: fixed;
  inset: 0;
  z-index: 10;
}

/* ── unified title (top-left) ── */
.title {
  position: fixed; top: 26px; left: 26px; z-index: 20;
  pointer-events: none;
  display: flex; flex-direction: column; gap: 7px;
  opacity: 0; animation: fadeIn 1.8s 0.5s ease forwards;
}
.t-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.18rem; font-weight: 300;
  letter-spacing: .38em;
  color: var(--ink);
  line-height: 1;
  display: flex; align-items: center; gap: 10px;
  white-space: nowrap;
}
.t-zh .dot {
  display: inline-block; width: 3.5px; height: 3.5px; border-radius: 50%;
  background: var(--accent); opacity: .8; margin-left: -4px;
}
.t-en {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: .96rem; letter-spacing: .07em;
  color: var(--ink-soft); line-height: 1;
}
.t-meta {
  font-family: 'Share Tech Mono', monospace;
  font-size: .52rem; letter-spacing: .32em;
  color: var(--ink-faint); margin-top: 2px;
}

/* ── back link (top-right) ── */
.back {
  position: fixed; top: 28px; right: 26px; z-index: 30;
  font-family: 'Share Tech Mono', monospace;
  font-size: .56rem; letter-spacing: .28em;
  color: var(--ink-faint); text-decoration: none;
  transition: color .3s;
}
.back:hover { color: var(--accent); }

/* ── audio toggle ── */
.audio-tg {
  position: fixed; right: 26px; top: 60px; z-index: 25;
  display: flex; align-items: center; gap: 9px; cursor: none;
  padding: 6px 11px 6px 9px;
  font-family: 'Share Tech Mono', monospace;
  font-size: .5rem; letter-spacing: .28em;
  color: var(--ink-faint);
  border: 1px solid var(--ink-trace);
  background: rgba(255,255,255,.02);
  backdrop-filter: blur(4px);
  transition: color .35s, border-color .35s;
}
.audio-tg:hover { color: var(--ink-soft); border-color: var(--ink-faint); }
.audio-tg .a-ring {
  width: 6px; height: 6px; border-radius: 50%;
  border: 1px solid currentColor; opacity: .65;
  transition: background .3s, box-shadow .3s, opacity .3s;
}
.audio-tg.on .a-ring {
  background: var(--accent); border-color: var(--accent);
  box-shadow: 0 0 8px var(--accent); opacity: .95;
}

/* ── poem (bottom-center) ── */
.poem {
  position: fixed; bottom: 96px; left: 50%;
  transform: translateX(-50%);
  text-align: center; z-index: 20;
  pointer-events: none; width: 90%; max-width: 560px;
  opacity: 0; animation: fadeIn 2.4s 1.6s ease forwards;
}
.poem p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: .92rem; line-height: 1.9;
  color: var(--ink-soft); letter-spacing: .1em;
}
.poem .zh {
  font-family: 'Noto Serif SC', serif; font-style: normal;
  font-weight: 300; font-size: .86rem; letter-spacing: .22em;
  color: var(--ink-faint); margin-top: 10px;
}

/* ── hint (bottom-center) ── */
.hint {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%); z-index: 25;
  display: flex; align-items: center; gap: 9px;
  font-family: 'Share Tech Mono', monospace;
  font-size: .52rem; letter-spacing: .24em;
  color: var(--ink-faint);
  pointer-events: none;
  opacity: 0; animation: fadeIn 2s 2.4s ease forwards;
}
.hint .pulse {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 2.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:.9;transform:scale(1.6)} }

/* ── corner marks ── */
.corner {
  position: fixed; width: 16px; height: 16px; pointer-events: none;
  z-index: 20; opacity: .22;
  border-color: var(--frame) !important;
}
.c-tl { top: 18px; left: 18px; border-top: 1px solid; border-left: 1px solid; }
.c-tr { top: 18px; right: 18px; border-top: 1px solid; border-right: 1px solid; }
.c-bl { bottom: 18px; left: 18px; border-bottom: 1px solid; border-left: 1px solid; }
.c-br { bottom: 18px; right: 18px; border-bottom: 1px solid; border-right: 1px solid; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px) translateX(var(--tx, 0)); }
  to { opacity: 1; transform: translateY(0) translateX(var(--tx, 0)); }
}
.poem, .hint { --tx: -50%; }

/* Floating symbol particles */
.symbol-particle {
  position: fixed;
  font-family: 'Cormorant Garamond', serif;
  color: var(--lavender);
  text-shadow: 0 0 10px rgba(155,114,216,0.6);
  pointer-events: none;
  z-index: 15;
  white-space: nowrap;
  animation: symFloat var(--dur) ease-out forwards;
}
@keyframes symFloat {
  0% { opacity: 0; transform: translateY(0) translateX(0) rotate(0deg); }
  15% { opacity: 0.8; }
  80% { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(var(--dy)) translateX(var(--dx)) rotate(var(--rot)); }
}

/* ── intro narrative (fades in, then out, before enter button) ── */
#intro {
  position: fixed;
  inset: 0;
  z-index: 90;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  pointer-events: none;
  padding: 0 24px;
}
.intro-line {
  display: block;
  font-family: 'Noto Serif SC', serif;
  font-weight: 300;
  font-size: clamp(13px, 1.7vw, 18px);
  line-height: 2.6;
  letter-spacing: .18em;
  color: var(--text-light);
  text-shadow: 0 0 26px rgba(155,114,216,0.35);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 2s ease, transform 2.2s ease;
}
.intro-line.show { opacity: 0.88; transform: translateY(0); }
#intro.fadeout .intro-line { opacity: 0; transition: opacity 1.8s ease; }
#intro.removed { display: none; }

/* Audio unlock button */
#audio-btn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100;
  background: rgba(20, 8, 50, 0.85);
  border: 1px solid rgba(155, 114, 216, 0.4);
  color: var(--mist);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  letter-spacing: 0.15em;
  padding: 18px 38px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(91, 45, 158, 0.25);
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.6s ease, background 0.4s, border-color 0.4s, box-shadow 0.4s, color 0.4s;
}
#audio-btn.show {
  opacity: 1;
  pointer-events: auto;
}
#audio-btn:hover {
  background: rgba(45, 16, 96, 0.9);
  border-color: rgba(155, 114, 216, 0.8);
  box-shadow: 0 0 60px rgba(155, 114, 216, 0.4);
  color: var(--glow);
}
#audio-btn.hidden { display: none; }

/* Wind ripple indicator (bottom-right) */
#wind-indicator {
  position: fixed;
  bottom: 30px;
  right: 26px;
  z-index: 20;
  display: flex;
  gap: 5px;
  align-items: flex-end;
  height: 24px;
  opacity: 0;
  animation: fadeIn 2s ease 2s forwards;
}
.wind-bar {
  width: 2px;
  background: var(--iris);
  border-radius: 2px;
  animation: windBar var(--wb-dur) ease-in-out var(--wb-delay) infinite alternate;
  opacity: 0.5;
}
@keyframes windBar {
  from { height: var(--h1); opacity: 0.3; }
  to { height: var(--h2); opacity: 0.7; }
}

@media (max-width: 560px) {
  .title { top: 18px; left: 18px; }
  .t-zh { font-size: 1.02rem; letter-spacing: .3em; }
  .back { top: 20px; right: 18px; }
  .audio-tg { top: 48px; right: 18px; }
  .poem { bottom: 84px; }
  .hint { bottom: 24px; font-size: .46rem; }
  #wind-indicator { bottom: 60px; right: 18px; }
}
</style>
<script src="page-transition.js"></script>

<script>
// ─── AUDIO ENGINE ───────────────────────────────────────────────
let audioCtx = null;
let masterGain = null;
let reverbNode = null;
let audioReady = false;
let soundOn = false;

// Pentatonic scale in D minor / dream tuning
const SCALE_FREQS = [
  146.83, // D3
  164.81, // E3
  174.61, // F3
  196.00, // G3
  220.00, // A3
  246.94, // B3
  293.66, // D4
  329.63, // E4
  349.23, // F4
  392.00, // G4
  440.00, // A4
  493.88, // B4
  587.33, // D5
  659.25, // E5
];

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(audioCtx.destination);
  // fade in
  masterGain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 2.0);

  // convolver reverb
  reverbNode = audioCtx.createConvolver();
  const len = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.8);
    }
  }
  reverbNode.buffer = buf;
  reverbNode.connect(masterGain);

  audioReady = true;
  soundOn = true;
  audioTg.classList.add('on');
  aLbl.textContent = 'SOUND · 开';
  startAmbientDrones();
}

function playStrawTone(freq, velocity = 0.5, x = 0.5) {
  if (!audioReady) return;
  const now = audioCtx.currentTime;

  // Oscillator blend: sine + triangle
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc2.type = 'triangle';
  osc1.frequency.value = freq;
  osc2.frequency.value = freq * 2.005; // slight detune

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(velocity * 0.18, now + 0.04);
  env.gain.exponentialRampToValueAtTime(velocity * 0.08, now + 0.35);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 2.2);

  // panner
  const panner = audioCtx.createStereoPanner();
  panner.pan.value = (x - 0.5) * 1.4;

  osc1.connect(env);
  osc2.connect(env);
  env.connect(panner);

  // wet/dry mix
  const dry = audioCtx.createGain(); dry.gain.value = 0.55;
  const wet = audioCtx.createGain(); wet.gain.value = 0.45;
  panner.connect(dry); dry.connect(masterGain);
  panner.connect(wet); wet.connect(reverbNode);

  osc1.start(now); osc2.start(now);
  osc1.stop(now + 2.5); osc2.stop(now + 2.5);
}

let droneOscs = [];
function startAmbientDrones() {
  // Low drone chord: D + A
  [73.4, 110.0, 146.8].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.value = [0.04, 0.03, 0.025][i];
    // subtle vibrato
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.15 + i * 0.07;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 0.4;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start();
    osc.connect(g);
    const wetG = audioCtx.createGain(); wetG.gain.value = 0.6;
    g.connect(wetG); wetG.connect(reverbNode);
    g.connect(masterGain);
    osc.start();
    droneOscs.push(osc);
  });
}

// ─── STAR CANVAS ────────────────────────────────────────────────
const starCanvas = document.getElementById('stars');
const sctx = starCanvas.getContext('2d');
let stars = [];

function initStars(W, H) {
  stars = [];
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.85,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random() * 0.6 + 0.1,
      da: (Math.random() * 0.003 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
      hue: 200 + Math.random() * 80,
    });
  }
}

function drawStars() {
  sctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  stars.forEach(s => {
    s.a += s.da;
    if (s.a > 0.75 || s.a < 0.05) s.da *= -1;
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fillStyle = `hsla(${s.hue}, 70%, 80%, ${s.a})`;
    sctx.fill();
  });
}

// ─── GRASS ENGINE ───────────────────────────────────────────────
const gc = document.getElementById('grass-canvas');
const ctx = gc.getContext('2d');

let W, H, straws = [];
let mouseX = -999, mouseY = -999;
let time = 0;

// Global wind
let windPhase = 0;
let windStrength = 0;
let windTarget = 0.4;
let windGustTimer = 0;

// Symbols released when straws sing
const SING_SYMBOLS = [
  '✦', '✧', '✶', '✷', '⊹', '⟡', '◦', '˚', '∗',
  '♪', '♫', '〜', '≈', '·', '°', '⁘', '⋆',
];

function resize() {
  W = gc.width = starCanvas.width = window.innerWidth;
  H = gc.height = starCanvas.height = window.innerHeight;
  initStars(W, H);
  buildStraws();
}

class Straw {
  constructor(x, bottomY) {
    this.x = x;
    this.bottomY = bottomY;
    this.height = 80 + Math.random() * 160;
    this.segments = 7 + Math.floor(Math.random() * 4);
    this.thickness = 1.0 + Math.random() * 2.0;
    this.swayAmp = 0.28 + Math.random() * 0.25;
    this.swaySpeed = 0.4 + Math.random() * 0.5;
    this.swayOffset = Math.random() * Math.PI * 2;
    this.hue = 230 + Math.random() * 80; // blue → violet
    this.sat = 45 + Math.random() * 30;
    this.lit = 40 + Math.random() * 30;
    this.glowAlpha = 0;
    this.singing = false;
    this.singCooldown = 0;
    this.noteIndex = Math.floor(Math.random() * SCALE_FREQS.length);
    this.tipGlow = 0;
    this.windPush = 0; // extra push from mouse/wind
    this.layer = 0.3 + Math.random() * 0.7; // depth
    // subtle ear: small leaf-like tip
    this.hasTip = Math.random() > 0.4;
    this.tipAngle = (Math.random() - 0.5) * 0.6;
  }

  getCurrentAngle(t) {
    const windSway = Math.sin(t * this.swaySpeed + this.swayOffset + windPhase * 0.8)
      * this.swayAmp * (0.5 + windStrength);
    const mouseDist = Math.abs(mouseX - this.x);
    const mouseInfluence = mouseDist < 120
      ? (1 - mouseDist / 120) * 0.5 * Math.sign(this.x - mouseX)
      : 0;
    return windSway + mouseInfluence + this.windPush * 0.3;
  }

  getPoints(t) {
    const baseAngle = this.getCurrentAngle(t);
    const pts = [];
    let cx = this.x, cy = this.bottomY;
    let cumAngle = 0;

    for (let i = 0; i <= this.segments; i++) {
      pts.push({ x: cx, y: cy });
      const frac = i / this.segments;
      const segLen = (this.height / this.segments) * (1 - frac * 0.15);
      // Curvature increases toward tip
      const curve = baseAngle * (frac * frac) * 1.4;
      cumAngle = curve;
      cx += Math.sin(cumAngle) * segLen;
      cy -= Math.cos(cumAngle) * segLen;
    }
    return pts;
  }

  draw(t) {
    const pts = this.getPoints(t);
    if (pts.length < 2) return;

    const tip = pts[pts.length - 1];
    const tipFrac = this.tipGlow;
    const depth = this.layer;

    // Straw body
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const px = (pts[i - 1].x + pts[i].x) / 2;
      const py = (pts[i - 1].y + pts[i].y) / 2;
      ctx.quadraticCurveTo(pts[i - 1].x, pts[i - 1].y, px, py);
    }
    ctx.quadraticCurveTo(pts[pts.length - 2].x, pts[pts.length - 2].y, tip.x, tip.y);

    // Color gradient bottom → tip
    const grad = ctx.createLinearGradient(pts[0].x, pts[0].y, tip.x, tip.y);
    const alpha = 0.35 + depth * 0.5;
    const hShift = this.singing ? 20 : 0;
    grad.addColorStop(0, `hsla(${this.hue + hShift}, ${this.sat}%, ${this.lit * 0.6}%, ${alpha * 0.5})`);
    grad.addColorStop(0.5, `hsla(${this.hue + hShift + 10}, ${this.sat + 10}%, ${this.lit}%, ${alpha})`);
    grad.addColorStop(1, `hsla(${this.hue + hShift + 20}, ${this.sat + 20}%, ${this.lit + 20}%, ${alpha * (0.8 + tipFrac * 0.5)})`);

    const lw = this.thickness * depth;
    ctx.strokeStyle = grad;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Tip glow when singing
    if (this.singing || this.tipGlow > 0.05) {
      const gr = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, 18 * tipFrac);
      gr.addColorStop(0, `hsla(${this.hue + 30}, 90%, 80%, ${0.7 * tipFrac})`);
      gr.addColorStop(0.5, `hsla(${this.hue + 20}, 80%, 65%, ${0.3 * tipFrac})`);
      gr.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 18 * tipFrac, 0, Math.PI * 2);
      ctx.fillStyle = gr;
      ctx.fill();

      // Inner bright dot
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 2.5 * tipFrac, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue + 40}, 100%, 90%, ${tipFrac})`;
      ctx.fill();
    }

    // Tip leaf
    if (this.hasTip && pts.length >= 2) {
      const p2 = pts[pts.length - 2];
      const ang = Math.atan2(tip.y - p2.y, tip.x - p2.x) + this.tipAngle;
      const tl = 8 + depth * 8;
      ctx.beginPath();
      ctx.moveTo(tip.x, tip.y);
      ctx.lineTo(tip.x + Math.cos(ang) * tl, tip.y + Math.sin(ang) * tl);
      ctx.strokeStyle = `hsla(${this.hue + 15}, ${this.sat + 10}%, ${this.lit + 10}%, ${alpha * 0.7})`;
      ctx.lineWidth = lw * 0.6;
      ctx.stroke();
    }

    // Decay tip glow
    if (this.tipGlow > 0) {
      this.tipGlow *= 0.975;
      if (this.tipGlow < 0.01) { this.tipGlow = 0; this.singing = false; }
    }
    if (this.singCooldown > 0) this.singCooldown--;
  }

  sing(velocity) {
    if (this.singCooldown > 0) return;
    this.singing = true;
    this.tipGlow = 1.0;
    this.singCooldown = 28;
    const freq = SCALE_FREQS[this.noteIndex % SCALE_FREQS.length];
    const xNorm = this.x / W;
    playStrawTone(freq, velocity * 0.6 + 0.3, xNorm);
    spawnSymbol(this);
  }
}

function buildStraws() {
  straws = [];
  // Layered: back → front
  const groundY = H * 0.82;
  for (let layer = 0; layer < 3; layer++) {
    const depth = (layer + 1) / 3;
    const count = 40 + layer * 25;
    for (let i = 0; i < count; i++) {
      const s = new Straw(
        Math.random() * W,
        groundY + (layer * 12) + Math.random() * 40
      );
      s.layer = 0.3 + depth * 0.65;
      s.height *= (0.55 + depth * 0.45);
      s.thickness = 0.8 + depth * 1.6;
      straws.push(s);
    }
  }
  // Sort by bottomY so back draws first
  straws.sort((a, b) => a.bottomY - b.bottomY);
}

// ─── SYMBOL PARTICLES ───────────────────────────────────────────
function spawnSymbol(straw) {
  if (Math.random() > 0.35) return;
  const pts = straw.getPoints(time);
  const tip = pts[pts.length - 1];
  const sym = SING_SYMBOLS[Math.floor(Math.random() * SING_SYMBOLS.length)];
  const el = document.createElement('div');
  el.className = 'symbol-particle';
  el.textContent = sym;
  const size = 11 + Math.random() * 10;
  el.style.cssText = `
    left: ${tip.x}px;
    top: ${tip.y}px;
    font-size: ${size}px;
    opacity: 0;
    --dur: ${2 + Math.random() * 2}s;
    --dy: ${-40 - Math.random() * 60}px;
    --dx: ${(Math.random() - 0.5) * 60}px;
    --rot: ${(Math.random() - 0.5) * 80}deg;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4500);
}

// ─── AUTO WIND SINGING ───────────────────────────────────────────
let autoSingTimer = 0;
function autoWindSing() {
  // Periodic wave of singing sweeps across
  autoSingTimer++;
  if (autoSingTimer % 48 === 0) {
    const waveX = (Math.sin(time * 0.08) * 0.5 + 0.5) * W;
    straws.forEach(s => {
      const d = Math.abs(s.x - waveX);
      if (d < 80 && Math.random() < 0.12) {
        s.sing(0.25 + Math.random() * 0.3);
      }
    });
  }
}

// ─── MAIN LOOP ──────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  time += 0.016;

  // Wind gust logic
  windGustTimer += 0.008;
  windTarget = 0.35 + Math.sin(windGustTimer) * 0.25 + Math.sin(windGustTimer * 2.3) * 0.15;
  windStrength += (windTarget - windStrength) * 0.015;
  windPhase += 0.012 + windStrength * 0.008;

  ctx.clearRect(0, 0, W, H);
  drawStars();

  // Ground mist
  const mistGrad = ctx.createLinearGradient(0, H * 0.72, 0, H);
  mistGrad.addColorStop(0, 'transparent');
  mistGrad.addColorStop(0.4, 'rgba(20, 8, 50, 0.15)');
  mistGrad.addColorStop(1, 'rgba(8, 4, 22, 0.7)');
  ctx.fillStyle = mistGrad;
  ctx.fillRect(0, H * 0.72, W, H * 0.28);

  // Draw straws
  straws.forEach(s => s.draw(time));

  // Mouse proximity singing
  if (mouseX > 0) {
    straws.forEach(s => {
      const dx = mouseX - s.x;
      const pts = s.getPoints(time);
      const tip = pts[pts.length - 1];
      const dy = mouseY - tip.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 55 && Math.random() < 0.04) {
        s.sing(0.3 + (1 - dist / 55) * 0.4);
      }
    });
  }

  autoWindSing();
}

// ─── EVENTS ─────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top = mouseY + 'px';
  cursorRing.style.left = mouseX + 'px';
  cursorRing.style.top = mouseY + 'px';
});

document.addEventListener('click', e => {
  if (!audioReady) return;
  mouseX = e.clientX;
  mouseY = e.clientY;
  // Click near straw: sing it
  let closest = null, minD = 60;
  straws.forEach(s => {
    const d = Math.abs(s.x - e.clientX);
    if (d < minD) { minD = d; closest = s; }
  });
  if (closest) {
    closest.sing(0.7);
    // Also sing neighbors
    straws.forEach(s => {
      if (Math.abs(s.x - e.clientX) < 90 && s !== closest && Math.random() < 0.5) {
        setTimeout(() => s.sing(0.35), 80 + Math.random() * 200);
      }
    });
  }
});

// Touch
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top = mouseY + 'px';
  cursorRing.style.left = mouseX + 'px';
  cursorRing.style.top = mouseY + 'px';
}, { passive: true });

document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
});

// ─── INTRO SEQUENCE ─────────────────────────────────────────────
const intro = document.getElementById('intro');
const audioBtn = document.getElementById('audio-btn');
const introLines = Array.from(document.querySelectorAll('.intro-line'));
let introDone = false;
const introTimers = [];

introLines.forEach((el, i) => {
  introTimers.push(setTimeout(() => el.classList.add('show'), 700 + i * 1500));
});
const lastShown = 700 + (introLines.length - 1) * 1500; // 5200
introTimers.push(setTimeout(() => intro.classList.add('fadeout'), lastShown + 3200));
introTimers.push(setTimeout(finishIntro, lastShown + 3200 + 1900));

function finishIntro() {
  if (introDone) return;
  introDone = true;
  introTimers.forEach(clearTimeout);
  intro.classList.add('fadeout');
  audioBtn.classList.add('show');
}

// click anywhere skips the intro
document.addEventListener('click', () => {
  if (!introDone) finishIntro();
});
document.addEventListener('touchstart', () => {
  if (!introDone) finishIntro();
}, { passive: true });

// ─── ENTER / AUDIO TOGGLE ───────────────────────────────────────
const audioTg = document.getElementById('audioTg');
const aLbl = document.getElementById('aLbl');

function enterFrequency() {
  initAudio();
  audioBtn.classList.add('hidden');
  intro.classList.add('removed');
  // Greet with a chord
  setTimeout(() => {
    [0, 2, 4, 7].forEach((ni, i) => {
      setTimeout(() => {
        const freq = SCALE_FREQS[ni];
        playStrawTone(freq, 0.4, 0.3 + i * 0.15);
      }, i * 220);
    });
  }, 500);
}

audioBtn.addEventListener('click', e => {
  e.stopPropagation();
  enterFrequency();
});

audioTg.addEventListener('click', e => {
  e.stopPropagation();
  if (!audioReady) {
    // entering via the toggle works too
    finishIntro();
    enterFrequency();
    return;
  }
  soundOn = !soundOn;
  audioTg.classList.toggle('on', soundOn);
  aLbl.textContent = 'SOUND · ' + (soundOn ? '开' : '关');
  const now = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(now);
  masterGain.gain.setValueAtTime(masterGain.gain.value, now);
  masterGain.gain.linearRampToValueAtTime(soundOn ? 0.6 : 0.0, now + 0.8);
  if (soundOn && audioCtx.state === 'suspended') audioCtx.resume();
});

window.addEventListener('resize', resize);
resize();
loop();
</script>
