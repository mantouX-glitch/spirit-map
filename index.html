<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirit Map · Cosmic Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+SC:wght@300;400&family=Share+Tech+Mono&display=swap');

:root {
  --void: #020408;
  --deep: #040810;
  --blue-sun: #0a2a6e;
  --cyan: #0af4ff;
  --gold: #c8a84b;
  --mist: #8090b8;
  --crystal: #d0c8ff;
  --text: #b8c8e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
}

/* ── STAR FIELD ── */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--dur) var(--delay) infinite alternate ease-in-out;
}

@keyframes twinkle {
  from { opacity: var(--min-op); transform: scale(1); }
  to   { opacity: var(--max-op); transform: scale(1.4); }
}

/* ── GRID OVERLAY ── */
.grid-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(10,244,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,244,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ── CRYSTAL CORE ── */
.crystal-core {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 400px;
  pointer-events: none;
  z-index: 0;
}

.crystal-core::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 40%,
    rgba(10,42,110,0.35) 0%,
    rgba(10,244,255,0.08) 40%,
    transparent 70%);
  animation: pulse 6s ease-in-out infinite;
}

.crystal-core::after {
  content: '';
  position: absolute;
  inset: 20%;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(10,244,255,0.12) 0%,
    transparent 70%);
  animation: pulse 6s ease-in-out infinite reverse;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.15); opacity: 1; }
}

/* ── ENTER transition: zoom into the crystal core, fade out the rest ── */
.page > * { transition: opacity 0.65s ease, transform 0.9s ease; }
body.entering .page > * {
  opacity: 0;
  transform: scale(0.96) translateY(-8px);
}
body.entering .crystal-core {
  transform: translate(-50%, -50%) scale(2.6);
  transition: transform 1.1s cubic-bezier(0.4, 0, 0.6, 1);
}
body.entering .stars,
body.entering .grid-overlay,
body.entering .scanline,
body.entering .corner {
  transition: opacity 0.6s ease;
  opacity: 0;
}

/* ── MAIN LAYOUT ── */
.page {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── NAV ── */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 48px;
  border-bottom: 1px solid rgba(10,244,255,0.08);
}

.nav-id {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  color: rgba(10,244,255,0.5);
  letter-spacing: 0.2em;
}

.nav-coords {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: rgba(139,152,184,0.5);
  letter-spacing: 0.1em;
}

/* ── HERO ── */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  text-align: center;
  gap: 0;
}

.hero-eyebrow {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: rgba(10,244,255,0.6);
  letter-spacing: 0.4em;
  margin-bottom: 32px;
  animation: fadeIn 1.5s ease both;
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(3.5rem, 10vw, 7rem);
  line-height: 0.95;
  letter-spacing: -0.02em;
  color: var(--crystal);
  animation: fadeIn 1.5s 0.3s ease both;
  margin-bottom: 8px;
}

.hero-title em {
  font-style: italic;
  color: rgba(200,168,75,0.9);
}

.hero-subtitle-zh {
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 300;
  font-size: 0.85rem;
  letter-spacing: 0.5em;
  color: var(--mist);
  margin-top: 20px;
  animation: fadeIn 1.5s 0.6s ease both;
}

.hero-line {
  width: 1px;
  height: 60px;
  background: linear-gradient(to bottom, rgba(10,244,255,0.4), transparent);
  margin: 40px auto;
  animation: fadeIn 1.5s 0.9s ease both;
}

.hero-poem {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: rgba(184,200,224,0.6);
  line-height: 2;
  max-width: 400px;
  animation: fadeIn 1.5s 1.2s ease both;
}

/* ── TERRAIN NODES ── */
.terrain-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  max-width: 900px;
  margin: 60px auto 0;
  width: 100%;
  padding: 0 40px;
  animation: fadeIn 2s 1.5s ease both;
}

.terrain-node {
  padding: 28px 24px;
  border: 1px solid rgba(10,244,255,0.06);
  cursor: pointer;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
  background: rgba(4,8,16,0.6);
}

.terrain-node::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--node-color);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.terrain-node:hover::before { opacity: 0.08; }

.terrain-node:hover {
  border-color: rgba(10,244,255,0.2);
}

.terrain-node:hover .node-name {
  color: var(--crystal);
}

.node-id {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: rgba(10,244,255,0.3);
  letter-spacing: 0.2em;
  margin-bottom: 10px;
}

.node-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 6px;
  transition: color 0.3s;
}

.node-name-zh {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.7rem;
  color: rgba(139,152,184,0.5);
  letter-spacing: 0.1em;
}

.node-status {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--node-color);
  box-shadow: 0 0 6px var(--node-color);
  animation: blink 3s var(--blink-delay) infinite;
}

@keyframes blink {
  0%, 90%, 100% { opacity: 1; }
  95% { opacity: 0.1; }
}

/* ── ENTER BUTTON ── */
.enter-wrap {
  display: flex;
  justify-content: center;
  padding: 60px 40px 80px;
  animation: fadeIn 2s 2s ease both;
}

.enter-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  color: rgba(10,244,255,0.7);
  border: 1px solid rgba(10,244,255,0.2);
  padding: 16px 48px;
  background: transparent;
  cursor: pointer;
  transition: all 0.4s ease;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  display: inline-block;
}

.enter-btn::before {
  content: '';
  position: absolute;
  left: -100%;
  top: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(10,244,255,0.08), transparent);
  transition: left 0.6s ease;
}

.enter-btn:hover::before { left: 100%; }
.enter-btn:hover {
  color: var(--cyan);
  border-color: rgba(10,244,255,0.5);
  box-shadow: 0 0 20px rgba(10,244,255,0.1);
}

/* ── SCANLINE ── */
.scanline {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(10,244,255,0.15), transparent);
  animation: scan 8s linear infinite;
  pointer-events: none;
  z-index: 50;
}

@keyframes scan {
  from { top: 0; }
  to { top: 100vh; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── CORNER MARKS ── */
.corner {
  position: fixed;
  width: 20px;
  height: 20px;
  pointer-events: none;
  z-index: 20;
  opacity: 0.3;
}
.corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
.corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
.corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
.corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

</style>
<script src="page-transition.js"></script>
</head>
<body>

<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Stars -->
<div class="stars" id="stars"></div>
<div class="grid-overlay"></div>
<div class="crystal-core"></div>

<div class="page">

  <nav>
    <div class="nav-id">SPIRIT MAP · v1.0 · PERSONAL ARCHIVE</div>
    <div class="nav-coords" id="coords">LAT — · LNG —</div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">// CONSCIOUSNESS CARTOGRAPHY PROJECT</div>
    <h1 class="hero-title">Spirit<br><em>Map</em></h1>
    <div class="hero-subtitle-zh">精 神 地 图</div>
    <div class="hero-line"></div>
    <p class="hero-poem">
      墟空是我，是他，是你<br>
      云端的海，我活在每一个神经元里<br>
      <br>
      Here was me buried.<br>
      Digital my ashes.
    </p>
  </div>

  <div class="enter-wrap">
    <a class="enter-btn" href="Spirit Map.html" data-no-transition>ENTER THE MAP →</a>
  </div>

</div>

<script>
// Generate stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 180; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 1.8 + 0.4;
  s.style.cssText = `
    width: ${size}px; height: ${size}px;
    top: ${Math.random()*100}%; left: ${Math.random()*100}%;
    --dur: ${Math.random()*4+2}s;
    --delay: ${Math.random()*5}s;
    --min-op: ${Math.random()*0.2+0.05};
    --max-op: ${Math.random()*0.5+0.3};
  `;
  starsEl.appendChild(s);
}

// Live coords
const coords = document.getElementById('coords');
setInterval(() => {
  const t = new Date();
  coords.textContent = `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')} · CONSCIOUSNESS ONLINE`;
}, 1000);

// Smooth ENTER transition — the blue core blooms, then a matching blue
// veil carries straight into the map (which fades in from the same blue)
document.querySelector('.enter-btn').addEventListener('click', e => {
  e.preventDefault();
  document.body.classList.add('entering');
  // hand off a deep-void tone so the map fades in gently from the same darkness
  try { sessionStorage.setItem('__pfInColor', '#03060e'); } catch (err) {}
  setTimeout(() => { window.location = 'Spirit Map.html'; }, 900);
});
</script>
</body>
</html>
