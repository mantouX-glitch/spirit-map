<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cartography of Inner World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&family=Share+Tech+Mono&display=swap');

:root {
  --cyan: #0af4ff;
  --crystal: #d0c8ff;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #020408;
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
  overflow-x: hidden;
  color: #b0a8c8;
  cursor: crosshair;
  animation: pageEnter 1.2s ease both;
}
@keyframes pageEnter {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Cosmic background layers */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--dur) var(--delay) infinite alternate ease-in-out;
}
@keyframes twinkle {
  from { opacity: var(--min-op); transform: scale(1); }
  to   { opacity: var(--max-op); transform: scale(1.4); }
}
.grid-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(10,244,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,244,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
}
.scanline {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(10,244,255,0.15), transparent);
  animation: scan 8s linear infinite;
  pointer-events: none;
  z-index: 50;
}
@keyframes scan {
  from { top: 0; }
  to   { top: 100vh; }
}
.corner {
  position: fixed;
  width: 20px;
  height: 20px;
  pointer-events: none;
  z-index: 20;
  opacity: 0.3;
}
.corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
.corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
.corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
.corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

/* Page content above cosmic background */
.page-content {
  position: relative;
  z-index: 10;
}

/* Back link — cyan to match cosmic */
.back-link {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: rgba(10,244,255,0.35);
  letter-spacing: 0.25em;
  text-decoration: none;
  z-index: 60;
  transition: color 0.3s;
  border: 1px solid rgba(10,244,255,0.1);
  padding: 8px 22px;
}
.back-link:hover { color: rgba(10,244,255,0.95); }

/* Page header — same headline structure as cosmic landing */
.page-header {
  text-align: center;
  padding: 100px 40px 28px;
}
.hero-eyebrow {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: rgba(10,244,255,0.6);
  letter-spacing: 0.4em;
  margin-bottom: 22px;
  animation: fadeIn 1.5s ease both;
}
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(2rem, 5.5vw, 3rem);
  line-height: 0.95;
  letter-spacing: -0.02em;
  color: var(--crystal);
  margin-bottom: 8px;
  animation: fadeIn 1.5s 0.3s ease both;
}
.hero-title em {
  font-style: italic;
  color: rgba(200,168,75,0.9);
}
.hero-subtitle-zh {
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 300;
  font-size: 0.72rem;
  letter-spacing: 0.42em;
  color: rgba(184,200,224,0.6);
  margin-top: 14px;
  animation: fadeIn 1.5s 0.6s ease both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.map-wrap {
  position: relative;
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 16px 24px;
}
svg.map { width: 100%; height: auto; display: block; }

/* Tooltip */
.tooltip {
  position: fixed;
  background: rgba(8,5,20,0.97);
  border: 1px solid rgba(120,90,180,0.32);
  border-radius: 6px;
  padding: 13px 16px;
  max-width: 260px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s;
  z-index: 200;
  font-size: 0.74rem;
  line-height: 1.75;
  color: #b0a8d0;
  backdrop-filter: blur(6px);
}
.tooltip.visible { opacity: 1; }
.tooltip .tip-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 0.92rem;
  color: #e6deff;
  margin-bottom: 4px;
  letter-spacing: 0.08em;
}
.tip-en {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.72rem;
  color: #7060a0;
  letter-spacing: 0.12em;
  margin-bottom: 7px;
}
.tip-sub {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed rgba(120,90,180,0.18);
  font-size: 0.66rem;
  color: #7868a0;
  letter-spacing: 0.04em;
}

.node { cursor: pointer; }
.node:hover .terrain-fill { filter: brightness(1.35); }
.node:hover .crystal-glow { opacity: 0.9; }
.node:hover .blue-sun-core { filter: brightness(1.3); }
.node .terrain-fill,
.node .crystal-glow,
.node .blue-sun-core { transition: filter 0.25s, opacity 0.25s; }

/* River shimmer */
.river-flow {
  stroke-dasharray: 6 14;
  animation: riverDash 5s linear infinite;
}
@keyframes riverDash { to { stroke-dashoffset: -60; } }

/* Crack subtle pulse */
.crack-glow { animation: crackPulse 6s ease-in-out infinite; }
@keyframes crackPulse {
  0%, 100% { opacity: 0.35; }
  50%      { opacity: 0.6; }
}

/* Dream Meadow pulse */
.dm-pulse { animation: dmPulse 7s ease-in-out infinite; transform-origin: 300px 90px; }
@keyframes dmPulse {
  0%, 100% { opacity: 0.55; transform: scale(1); }
  50%      { opacity: 0.8;  transform: scale(1.06); }
}

/* Blue sun pulse */
.blue-sun-pulse { animation: bsPulse 9s ease-in-out infinite; transform-origin: 300px 1120px; }
@keyframes bsPulse {
  0%, 100% { opacity: 0.55; }
  50%      { opacity: 0.85; }
}

/* Crystal halo pulse — subtle since no beam */
.crystal-halo { animation: crystalPulse 6s ease-in-out infinite; transform-origin: 470px 305px; }
@keyframes crystalPulse {
  0%, 100% { opacity: 0.55; transform: scale(1); }
  50%      { opacity: 0.85; transform: scale(1.08); }
}

/* Fissure eye blink (small, hidden in crack) */
.eye-blink { animation: blink 11s ease-in-out infinite; transform-origin: center; }
@keyframes blink {
  0%, 92%, 100% { transform: scaleY(1); }
  94%, 96%     { transform: scaleY(0.1); }
}

/* Valley lanterns: many small lights breathing */
.lantern { animation: lanternPulse 5s ease-in-out infinite alternate; }
.lantern-a { animation-duration: 4.2s; animation-delay: 0s;   }
.lantern-b { animation-duration: 5.6s; animation-delay: 0.6s; }
.lantern-c { animation-duration: 4.8s; animation-delay: 1.2s; }
.lantern-d { animation-duration: 6.2s; animation-delay: 1.8s; }
.lantern-e { animation-duration: 5.1s; animation-delay: 2.4s; }
.lantern-f { animation-duration: 4.5s; animation-delay: 3.0s; }
@keyframes lanternPulse {
  from { opacity: 0.45; }
  to   { opacity: 0.92; }
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 18px;
  justify-content: center;
  padding: 8px 20px 56px;
  max-width: 720px;
  margin: 0 auto;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.66rem;
  color: #605880;
  letter-spacing: 0.06em;
  font-family: 'Noto Serif SC', serif;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-dot.sq { border-radius: 1px; }
.legend-dot.di { transform: rotate(45deg); border-radius: 1px; }
</style>
</head>
<body>

<!-- Cosmic background -->
<div class="stars" id="stars"></div>
<div class="grid-overlay"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<a class="back-link" href="index.html">← BACK</a>

<div style="
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 22px 48px;
  border-bottom: 1px solid rgba(10,244,255,0.08);
  z-index: 55;
  pointer-events: none;
">
  <div style="font-family:'Share Tech Mono',monospace; font-size:0.7rem; color:rgba(10,244,255,0.5); letter-spacing:0.2em;">
    SPIRIT MAP · v1.0 · PERSONAL ARCHIVE
  </div>
  <div id="coords2" style="font-family:'Share Tech Mono',monospace; font-size:0.65rem; color:rgba(139,152,184,0.5); letter-spacing:0.1em;">
    — : — : — · CONSCIOUSNESS ONLINE
  </div>
</div>

<div class="page-content">

<div class="page-header">
  <div class="hero-eyebrow">// THE CARTOGRAPHY OF INNER WORLD</div>
  <h1 class="hero-title">Spirit <em>Map</em></h1>
  <div class="hero-subtitle-zh">精 神 地 图</div>
</div>

<div class="map-wrap">
<svg class="map" viewBox="0 0 600 1120" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Background -->
  <radialGradient id="bgMain" cx="50%" cy="28%" r="80%">
    <stop offset="0%"  stop-color="#0e0a22"/>
    <stop offset="55%" stop-color="#070418"/>
    <stop offset="100%" stop-color="#02010a"/>
  </radialGradient>

  <!-- Dream Meadow white sun -->
  <radialGradient id="dmGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
    <stop offset="22%"  stop-color="#e8d8ff" stop-opacity="0.55"/>
    <stop offset="55%"  stop-color="#8060c8" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#30186001" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="dmCore" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
    <stop offset="60%"  stop-color="#f4ecff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#c8b0ff" stop-opacity="0.7"/>
  </radialGradient>

  <!-- Blue sun halo -->
  <radialGradient id="blueSunHalo" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#80c8ff" stop-opacity="0.6"/>
    <stop offset="40%"  stop-color="#3070d0" stop-opacity="0.3"/>
    <stop offset="80%"  stop-color="#102860" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#02081c" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="blueSunCore" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#b8dcff" stop-opacity="0.7"/>
    <stop offset="50%"  stop-color="#5090e0" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#2860c0" stop-opacity="0.15"/>
  </radialGradient>

  <!-- Wasteland → blue sun atmospheric transition -->
  <linearGradient id="transitionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#3a261c" stop-opacity="0"/>
    <stop offset="25%"  stop-color="#1c1422" stop-opacity="0.65"/>
    <stop offset="55%"  stop-color="#0a1030" stop-opacity="0.85"/>
    <stop offset="80%"  stop-color="#082058" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#0a3080" stop-opacity="0.2"/>
  </linearGradient>

  <!-- Mountain gradients -->
  <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#1c1a36"/>
    <stop offset="55%"  stop-color="#13122a"/>
    <stop offset="100%" stop-color="#0a081c"/>
  </linearGradient>
  <linearGradient id="mountainBack" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#1a1f3a" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#0c0e22" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="snowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#e8e0f8" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#a09cd0" stop-opacity="0"/>
  </linearGradient>

  <!-- Valley ambient (very subtle - lanterns do the work) -->
  <radialGradient id="valleyAmbient" cx="50%" cy="55%" r="55%">
    <stop offset="0%"   stop-color="#f0c850" stop-opacity="0.18"/>
    <stop offset="55%"  stop-color="#a06830" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#604020" stop-opacity="0"/>
  </radialGradient>

  <!-- Dune gradients -->
  <linearGradient id="dune1" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#4a3328" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#2a1c1c" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="dune2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#5a3e2a" stop-opacity="0.78"/>
    <stop offset="100%" stop-color="#322020" stop-opacity="0.92"/>
  </linearGradient>
  <linearGradient id="dune3" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#6a4830" stop-opacity="0.78"/>
    <stop offset="100%" stop-color="#3a261c" stop-opacity="0.94"/>
  </linearGradient>
  <linearGradient id="dune4" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#7a4e34" stop-opacity="0.75"/>
    <stop offset="55%"  stop-color="#5a3a24" stop-opacity="0.92"/>
    <stop offset="100%" stop-color="#42281c" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="dunesHaze" cx="50%" cy="0%" r="60%">
    <stop offset="0%"   stop-color="#6e5a48" stop-opacity="0.32"/>
    <stop offset="100%" stop-color="#1a1018" stop-opacity="0"/>
  </radialGradient>

  <!-- Surface dust band -->
  <linearGradient id="surfaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#0a0a18" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#1a142a" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#0a0814" stop-opacity="0"/>
  </linearGradient>

  <!-- River fade -->
  <linearGradient id="riverFadeGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="white"/>
    <stop offset="100%" stop-color="black"/>
  </linearGradient>
  <mask id="riverFadeMask">
    <rect x="0" y="0"    width="600" height="1010" fill="white"/>
    <rect x="0" y="1010" width="600" height="60"  fill="url(#riverFadeGrad)"/>
    <rect x="0" y="1070" width="600" height="60"  fill="black"/>
  </mask>

  <!-- River body -->
  <linearGradient id="riverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#1850b8" stop-opacity="0.6"/>
    <stop offset="50%"  stop-color="#1040b0" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0628701" stop-opacity="0.6"/>
  </linearGradient>

  <!-- Fissure -->
  <linearGradient id="fissureCore" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#5028a0" stop-opacity="0"/>
    <stop offset="40%"  stop-color="#7848d0" stop-opacity="0.7"/>
    <stop offset="60%"  stop-color="#a060f0" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#2010601" stop-opacity="0"/>
  </linearGradient>

  <!-- Eye glow (small fissure eye) -->
  <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#e0c8ff" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#8060c0" stop-opacity="0"/>
  </radialGradient>

  <!-- Crystal -->
  <linearGradient id="crystalFace" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#d8c4ff" stop-opacity="0.95"/>
    <stop offset="60%"  stop-color="#7858c8" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#2c1860" stop-opacity="0.9"/>
  </linearGradient>
  <radialGradient id="crystalHaloGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#e8d0ff" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#5028a0" stop-opacity="0"/>
  </radialGradient>

  <!-- Filters -->
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="22" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="riverGlow" x="-30%" y="-10%" width="160%" height="120%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Sand grain -->
  <filter id="sandGrain" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="2.6" numOctaves="2" seed="7" result="noise"/>
    <feColorMatrix in="noise" type="matrix"
      values="0 0 0 0 0.44
              0 0 0 0 0.30
              0 0 0 0 0.22
              0 0 0 0.5 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>

  <clipPath id="mapClip">
    <rect x="0" y="0" width="600" height="1120"/>
  </clipPath>

  <!-- Wasteland clip — for the second river pass -->
  <clipPath id="wastelandClip">
    <rect x="0" y="772" width="600" height="295"/>
  </clipPath>
</defs>

<!-- ═════════════ BACKGROUND ═════════════ -->
<rect width="600" height="1120" fill="url(#bgMain)"/>

<!-- distant stars -->
<g opacity="0.55">
  <circle cx="48"  cy="28"  r="0.7" fill="#fff"/>
  <circle cx="130" cy="12"  r="0.5" fill="#c0d0ff"/>
  <circle cx="220" cy="42"  r="0.6" fill="#fff"/>

  <circle cx="476" cy="78"  r="0.4" fill="#fff"/>

<g mask="url(#riverFadeMask)" clip-path="url(#mapClip)">
  <path d="M 220 -10

  <path d="M 220 -10

</g>

<!-- ════════════ DREAM MEADOW · WHITE SUN ════════════ -->
<circle cx="300" cy="90" r="160" fill="url(#dmGrad)" filter="url(#bigGlow)" class="dm-pulse"/>
<ellipse cx="300" cy="85" rx="120" ry="32" fill="none" stroke="#a890e0" stroke-width="0.7" opacity="0.35"/>
<ellipse cx="300" cy="85" rx="150" ry="42" fill="none" stroke="#7860b8" stroke-width="0.4" opacity="0.22"/>

<g class="node"
   data-name="Dream Meadow · 源星球"
   data-en="Dream Meadow"
   data-desc="生命不局限于人类形态，意识进化为全新的结构。蓝紫色的稻草发出梦的频率，意识可以漫游。时间在这里是非线性的，过去、未来、现在同时渗透。">

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tip-name" id="tipName"></div>
  <div class="tip-en" id="tipEn"></div>
  <div id="tipDesc" style="white-space:pre-line"></div>
  <div class="tip-sub" id="tipSub" style="display:none"></div>
</div>

<script>
// Live clock
const coords2 = document.getElementById('coords2');
if (coords2) {
  setInterval(() => {
    const t = new Date();
    coords2.textContent = `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')} · CONSCIOUSNESS ONLINE`;
  }, 1000);
}

// Star field generation
const starsEl = document.getElementById('stars');
for (let i = 0; i < 180; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 1.8 + 0.4;
  s.style.cssText = `
    width: ${size}px; height: ${size}px;
    top: ${Math.random()*100}%; left: ${Math.random()*100}%;
    --dur: ${Math.random()*4+2}s;
    --delay: ${Math.random()*5}s;
    --min-op: ${Math.random()*0.2+0.05};
    --max-op: ${Math.random()*0.5+0.3};
  `;
  starsEl.appendChild(s);
}

const tooltip = document.getElementById('tooltip');
const tipName = document.getElementById('tipName');
const tipEn   = document.getElementById('tipEn');
const tipDesc = document.getElementById('tipDesc');
const tipSub  = document.getElementById('tipSub');

document.querySelectorAll('.node').forEach(el => {
  el.addEventListener('mouseenter', () => {
    const name = el.dataset.name || '';
    const en   = el.dataset.en   || '';
    if (name) { tipName.textContent = name; tipName.style.display = 'block'; }
    else      { tipName.style.display = 'none'; }
    tipEn.textContent   = en;
    tipDesc.textContent = el.dataset.desc || '';
    if (el.dataset.sub) {
      tipSub.textContent = el.dataset.sub;
      tipSub.style.display = 'block';
    } else {
      tipSub.style.display = 'none';
    }
    tooltip.classList.add('visible');
  });
  el.addEventListener('mousemove', e => {
    let x = e.clientX + 18, y = e.clientY + 18;
    if (x + 290 > window.innerWidth)  x = e.clientX - 290;
    if (y + 240 > window.innerHeight) y = e.clientY - 240;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  });
  el.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
});
</script>
