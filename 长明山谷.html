<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长明山谷 · Eternal Valley</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #f0e3c4;
  --gold: #d4a84b;
  --gold-dim: #7a5a20;
  --text-dim: #6a5840;
  --mist: #9098b8;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #14182a;
  font-family: 'Noto Serif SC', serif;
  color: var(--cream);
  cursor: none;
}

canvas {
  position: absolute;
  inset: 0;
  display: block;
}
#bgCanvas { z-index: 1; }
#mainCanvas { z-index: 2; }

/* ── custom candle cursor ── */
#cursor {
  position: fixed;
  width: 22px; height: 22px;
  pointer-events: none;
  z-index: 999;
  transform: translate(-50%, -50%);
  font-size: 18px;
  line-height: 1;
  filter: drop-shadow(0 0 6px rgba(212,168,75,0.7));
  animation: cursorFlame 1.5s ease-in-out infinite;
  user-select: none;
}
@keyframes cursorFlame {
  0%, 100% { filter: drop-shadow(0 0 4px rgba(212,168,75,0.55)); }
  50%      { filter: drop-shadow(0 0 12px rgba(255,170,60,0.9)); }
}

/* ── top-left title (unified with other terrains) ── */
.nav {
  position: fixed;
  top: 26px;
  left: 26px;
  z-index: 50;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.nav-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.18rem;
  font-weight: 300;
  letter-spacing: 0.38em;
  color: rgba(232,208,150,0.82);
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.nav-zh .dot {
  display: inline-block;
  width: 3.5px; height: 3.5px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.7;
  margin-left: -4px;
}
.nav-en {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 0.96rem;
  letter-spacing: 0.07em;
  color: rgba(170,140,80,0.6);
  line-height: 1;
}
.nav-meta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.32em;
  color: rgba(180,150,90,0.42);
  margin-top: 2px;
}
.back {
  position: fixed;
  top: 28px;
  right: 26px;
  z-index: 60;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.28em;
  color: rgba(180,150,90,0.45);
  text-decoration: none;
  transition: color 0.3s;
}
.back:hover { color: rgba(220,185,120,0.85); }

/* ── hero overlay (narrative only, fades in then out) ── */
.hero {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  text-align: center;
  padding: 0 24px;
}

.hero-narrative {
  max-width: 480px;
  font-size: 13px;
  line-height: 2.4;
  letter-spacing: 0.12em;
  color: rgba(220,195,140,0.7);
  font-weight: 300;
}
.hero-narrative .line {
  display: block;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 2s ease, transform 2.2s ease;
}
.hero-narrative .line.show { opacity: 1; transform: translateY(0); }
.hero-narrative.fadeout .line { opacity: 0; transition: opacity 2s ease; }

/* ── hover tooltip (anchored to lantern by JS) ── */
.tooltip {
  position: fixed;
  z-index: 30;
  pointer-events: none;
  text-align: center;
  transform: translate(-50%, 0);
  opacity: 0;
  transition: opacity 0.5s ease;
  white-space: nowrap;
}
.tooltip.show { opacity: 1; }
.tooltip-name {
  font-size: 14px;
  letter-spacing: 0.28em;
  color: rgba(240,225,180,0.85);
  font-weight: 300;
  text-shadow: 0 0 16px rgba(212,168,75,0.4);
}
.tooltip-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  color: rgba(200,170,110,0.55);
  margin-top: 8px;
  letter-spacing: 0.08em;
}
.tooltip-action {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.32em;
  color: rgba(180,150,90,0.4);
  margin-top: 14px;
  text-transform: uppercase;
}

/* ── bottom hint ── */
.hint {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  text-align: center;
  opacity: 0;
  transition: opacity 1.8s ease;
  pointer-events: none;
}
.hint.show { opacity: 1; }
.hint.fadeout { opacity: 0; }
.hint-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.32em;
  color: rgba(180,150,90,0.45);
  text-transform: uppercase;
}
.hint-line {
  width: 1px;
  height: 26px;
  background: linear-gradient(to bottom, rgba(180,150,90,0.4), transparent);
  margin: 12px auto 0;
}

/* ── audio toggle ── */
.audio-btn {
  position: fixed;
  bottom: 28px;
  left: 32px;
  z-index: 60;
  background: transparent;
  border: none;
  cursor: none;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  color: rgba(180,150,90,0.45);
  padding: 8px;
  transition: color 0.3s;
  user-select: none;
}
.audio-btn:hover { color: rgba(220,185,120,0.85); }

/* ── input panel ── */
.input-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(10,12,22,0);
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  transition: opacity 0.9s ease, background 1.1s ease, backdrop-filter 1.1s ease;
}
.input-overlay.open {
  display: flex;
  opacity: 1;
  background: rgba(10,12,22,0.74);
  backdrop-filter: blur(7px);
  -webkit-backdrop-filter: blur(7px);
}

.input-panel {
  width: 100%;
  max-width: 520px;
  padding: 60px 52px;
  background:
    radial-gradient(120% 100% at 50% 0%, rgba(212,168,75,0.07), transparent 60%),
    linear-gradient(165deg, rgba(22,26,46,0.92), rgba(30,24,42,0.90));
  border: 1px solid rgba(212,168,75,0.16);
  border-radius: 18px;
  position: relative;
  box-shadow:
    0 40px 100px rgba(0,0,0,0.5),
    0 0 80px rgba(212,168,75,0.05),
    inset 0 1px 0 rgba(255,230,180,0.06),
    inset 0 0 70px rgba(212,168,75,0.03);
  transform: translateY(26px) scale(0.965);
  opacity: 0;
  filter: blur(2px);
  transition: transform 1s cubic-bezier(0.16,1,0.3,1),
              opacity 0.9s ease,
              filter 0.9s ease;
}
.input-overlay.open .input-panel {
  transform: translateY(0) scale(1);
  opacity: 1;
  filter: blur(0px);
}

.input-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.32em;
  color: rgba(180,150,90,0.5);
  text-transform: uppercase;
  margin-bottom: 28px;
  text-align: center;
}

.input-field {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(212,168,75,0.18);
  color: var(--cream);
  font-family: 'Noto Serif SC', serif;
  font-weight: 300;
  font-size: 16px;
  line-height: 1.9;
  letter-spacing: 0.06em;
  resize: none;
  outline: none;
  padding: 14px 4px 18px;
  min-height: 84px;
  caret-color: var(--gold);
}
.input-field::placeholder {
  color: rgba(180,150,90,0.32);
  font-style: italic;
}
.input-field:focus { border-bottom-color: rgba(212,168,75,0.45); }

.input-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
}

.input-cancel {
  background: none;
  border: none;
  cursor: none;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  color: rgba(140,120,80,0.55);
  text-transform: uppercase;
  padding: 8px 4px;
  transition: color 0.3s;
}
.input-cancel:hover { color: rgba(180,150,90,0.9); }

.input-submit {
  background: transparent;
  border: 1px solid rgba(212,168,75,0.4);
  color: rgba(240,210,140,0.9);
  font-family: 'Noto Serif SC', serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.25em;
  padding: 12px 30px;
  border-radius: 40px;
  cursor: none;
  transition: all 0.4s ease;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.input-submit:hover {
  border-color: rgba(220,185,120,0.85);
  color: var(--cream);
  box-shadow: 0 0 32px rgba(212,168,75,0.15);
}
.input-submit .flame {
  font-size: 15px;
  filter: drop-shadow(0 0 6px rgba(212,168,75,0.7));
}

/* ── corner marks for a 'gallery' feel ── */
.corner {
  position: fixed;
  width: 14px; height: 14px;
  pointer-events: none;
  z-index: 20;
  opacity: 0.18;
}
.corner.tl { top: 14px; left: 14px; border-top: 1px solid #d4a84b; border-left: 1px solid #d4a84b; }
.corner.tr { top: 14px; right: 14px; border-top: 1px solid #d4a84b; border-right: 1px solid #d4a84b; }
.corner.bl { bottom: 14px; left: 14px; border-bottom: 1px solid #d4a84b; border-left: 1px solid #d4a84b; }
.corner.br { bottom: 14px; right: 14px; border-bottom: 1px solid #d4a84b; border-right: 1px solid #d4a84b; }
</style>
<script src="page-transition.js"></script>
</head>
<body>

<template id="__bundler_thumbnail" data-bg-color="#1a2146">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#1a2146"/>
    <path d="M0 520 L300 430 L500 540 L600 580 L700 540 L900 430 L1200 520 L1200 800 L0 800 Z" fill="#181d3c"/>
    <radialGradient id="g" cx="50%" cy="58%" r="40%">
      <stop offset="0%" stop-color="#ffbe46" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffbe46" stop-opacity="0"/>
    </radialGradient>
    <ellipse cx="600" cy="470" rx="340" ry="240" fill="url(#g)"/>
    <g fill="#ffe196">
      <circle cx="600" cy="470" r="9"/>
      <circle cx="470" cy="500" r="6" opacity="0.85"/>
      <circle cx="730" cy="495" r="6" opacity="0.85"/>
      <circle cx="540" cy="540" r="4" opacity="0.7"/>
      <circle cx="670" cy="545" r="4" opacity="0.7"/>
    </g>
  </svg>
</template>

<canvas id="bgCanvas"></canvas>
<canvas id="mainCanvas"></canvas>

<div id="cursor">🕯</div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="nav" id="nav">
  <div class="nav-zh">长<span class="dot"></span>明<span class="dot"></span>山<span class="dot"></span>谷</div>
  <div class="nav-en">Eternal Valley</div>
  <div class="nav-meta">N° 004 · EMBER · 山谷</div>
</div>

<a class="back" href="Spirit Map.html">← SPIRIT MAP</a>

<div class="hero" id="hero">
  <div class="hero-narrative" id="heroNarrative">
    <span class="line">在山谷里，碎片不会消失。</span>
    <span class="line">那些充分表达，不再压抑的情绪，</span>
    <span class="line">化作你亲手点燃的灯。</span>
    <span class="line">不灭，照亮山谷长明。</span>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-name" id="tipName"></div>
  <div class="tooltip-sub" id="tipSub"></div>
  <div class="tooltip-action" id="tipAction"></div>
</div>

<div class="hint" id="hint">
  <div class="hint-text">轻触一盏 · 让它亮起来</div>
  <div class="hint-line"></div>
</div>

<button class="audio-btn" id="audioBtn">♪ &nbsp;ON</button>

<div class="input-overlay" id="inputOverlay">
  <div class="input-panel">
    <div class="input-label">点 一 盏 属 于 你 的 灯</div>
    <textarea
      class="input-field"
      id="inputField"
      rows="3"
      placeholder="写下任何你想说的，然后放手"
      maxlength="120"
    ></textarea>
    <div class="input-actions">
      <button class="input-cancel" id="inputCancel">取消</button>
      <button class="input-submit" id="inputSubmit">
        <span class="flame">🕯</span>
        <span>点 燃</span>
      </button>
    </div>
  </div>
</div>

<div id="ev-tweaks-root"></div>

<script src="valley.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ev-tweaks.jsx"></script>
</body>
</html>
